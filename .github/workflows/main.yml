name: Deploy Strapi Built App to EC2

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2️⃣ Setup Node 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

       # 3️⃣ Install dependencies locally
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the Strapi admin panel locally
      - name: Build Strapi admin
        run: npm run build

      # 5️⃣ Create deployment archive outside project folder
      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.github' \
              --exclude='.gitignore' \
              --exclude='deploy' \
              -czf deploy/strapi-build.tar.gz .

      # 6️⃣ Copy the archive to EC2 using absolute path
      - name: Copy archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "deploy/strapi-build.tar.gz"
          target: "/home/ec2-user/strapi/"

      # 7️⃣ Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.2        # consider upgrading to ~v1.0.3+ if possible
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="$HOME/strapi"
            ARCHIVE="$APP_DIR/strapi-build.tar.gz"

            echo "app dir    : $APP_DIR"
            echo "archive path: $ARCHIVE"

            # ─── Clean previous failed attempts ───
            rm -rf "$APP_DIR/strapi-build.tar.gz"   # remove directory if exists

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Debug what arrived
            ls -la .

            if [ ! -f "$ARCHIVE" ]; then
              echo "ERROR: Deployment archive not found!"
              echo "Content of $APP_DIR:"
              ls -alh "$APP_DIR"
              find "$APP_DIR" -maxdepth 2 -ls
              exit 9
            fi

            echo "Archive looks good — continuing..."
            # tar -xzf "$ARCHIVE" --strip-components=1   # or however you unpack
            # rm -f "$ARCHIVE"
            # pm2 restart strapi   # or docker-compose up -d, systemctl restart, etc.